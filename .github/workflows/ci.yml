name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tests
        uses: actions/checkout@v4

      - name: Checkout flowstate-api
        uses: actions/checkout@v4
        with:
          repository: travwritescode/flowstate-api
          path: flowstate-api

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: flowstate-api/requirements.txt

      - name: Install API dependencies
        run: pip install -r flowstate-api/requirements.txt

      - name: Configure API env
        working-directory: flowstate-api
        run: |
          cp .env.example .env
          SECRET=$(openssl rand -hex 32)
          sed -i "s/^SECRET_KEY=.*/SECRET_KEY=$SECRET/" .env

      - name: Apply migrations
        working-directory: flowstate-api
        run: alembic upgrade head

      - name: Start API
        working-directory: flowstate-api
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/uvicorn.log 2>&1 &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for /health
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health | grep -q '"status"'; then
              exit 0
            fi
            sleep 1
          done
          echo "--- uvicorn log ---"
          cat /tmp/uvicorn.log || true
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Run Vitest
        env:
          API_BASE_URL: http://127.0.0.1:8000
        run: npm test

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/uvicorn.pid ]; then kill "$(cat /tmp/uvicorn.pid)" 2>/dev/null || true; fi
